<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JimoTown • Post Lab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&family=Poppins:wght@600;700&family=Manrope:wght@700&family=Clash+Grotesk:wght@600;700&family=Instrument+Sans:wght@600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --surface: #161616;
    --border: #242424;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    width: 100%;
  }

  body { display: flex; flex-direction: column; }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.98);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .main {
    flex: 1;
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .preview-section { width: 100%; }
  .preview-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-align: center;
  }

  .preview-frame {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #000;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    border: 1px solid #222;
  }

  #previewCanvas { width: 100%; height: 100%; object-fit: contain; background: #000; }

  .controls-section {
    background: var(--panel);
    border-radius: 24px;
    border: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .bg-button {
    width: 100%;
    padding: 18px;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 18px;
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .bg-button:active { background: rgba(232,255,71,0.1); border-color: var(--accent); }

  .bg-strip { display: flex; gap: 12px; overflow-x: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }

  .bg-thumb {
    width: 62px; height: 62px; border-radius: 14px; object-fit: cover;
    cursor: pointer; border: 3px solid transparent; filter: grayscale(75%); flex-shrink: 0;
  }

  .bg-thumb.active { border-color: var(--accent); filter: none; transform: scale(1.06); }

  textarea {
    width: 100%; height: 140px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 16px; color: white; font-size: 15.5px; line-height: 1.65; resize: none;
  }

  .font-select {
    width: 100%; padding: 16px 18px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; color: white; font-size: 15px; cursor: pointer;
  }

  .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .control-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px;
  }

  .ctrl-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 10px; }

  .ctrl-value { font-family: 'DM Mono', monospace; font-size: 26px; color: var(--accent); text-align: center; font-weight: 600; }

  .spin-btn {
    width: 50px; height: 50px; background: #0a0a0a; border: 1px solid var(--border);
    border-radius: 14px; font-size: 28px; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .spin-btn:active { background: var(--accent); color: black; transform: scale(0.92); }

  .text-actions { display: flex; gap: 12px; margin-top: 10px; }

  .ghost-btn {
    flex: 1; padding: 14px; background: transparent; border: 1px solid var(--border);
    border-radius: 14px; color: var(--muted); font-size: 14px; cursor: pointer;
  }

  .ghost-btn.red { color: #ff6666; border-color: #ff6666; }

  .download-btn {
    width: 100%; height: 62px;
    background: linear-gradient(90deg, var(--accent), #c8ff00);
    color: black;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.6px;
    border: none;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 10px 30px rgba(232, 255, 71, 0.35);
  }

  .download-btn:active { transform: scale(0.97); }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #1f1f1f; border: 1px solid var(--accent); color: var(--accent);
    padding: 14px 26px; border-radius: 50px; font-size: 14.5px; font-weight: 500;
    z-index: 1000; opacity: 0; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-12px); }
</style>
</head>
<body>

<header>
  <div class="logo">JIMOTOWN</div>
  <div style="font-family:monospace; font-size:11px; color:#666;">POST LAB</div>
</header>

<div class="main">
  <div class="preview-section">
    <div class="preview-header">LIVE PREVIEW — 1080 × 1920</div>
    <div class="preview-frame">
      <canvas id="previewCanvas" width="1080" height="1920"></canvas>
    </div>
  </div>

  <div class="controls-section">
    <!-- Background, Text, Font, Adjustments sections remain the same as previous version -->
    <div>
      <div class="section-label">Background</div>
      <label class="bg-button">
        <input type="file" id="bgFileInput" accept="image/*" multiple style="display:none;">
        🖼️ Choose Background Image(s)
      </label>
      <div class="bg-strip" id="bgStrip"></div>
      <button id="clearImgBtn" style="margin-top:12px;width:100%;padding:12px;background:transparent;border:1px solid #ff5555;color:#ff5555;border-radius:14px;display:none;">Clear All Backgrounds</button>
    </div>

    <div>
      <div class="section-label">Text Content</div>
      <textarea id="textInput" placeholder="Write your viral caption here..."></textarea>
      <div class="text-actions">
        <button class="ghost-btn red" id="clearTextBtn">✕ Clear Text</button>
      </div>
    </div>

    <div>
      <div class="section-label">Font Style</div>
      <select id="fontSelect" class="font-select"></select>
    </div>

    <div>
      <div class="section-label">Adjustments</div>
      <div class="controls-grid">
        <div class="control-card">
          <div class="ctrl-label">FONT SIZE</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="spin-btn" id="fontDec">−</button>
            <span class="ctrl-value" id="sizeValue">82</span>
            <button class="spin-btn" id="fontInc">+</button>
          </div>
        </div>
        <div class="control-card">
          <div class="ctrl-label">BLUR</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="spin-btn" id="blurDec">−</button>
            <span class="ctrl-value" id="blurValue">5</span>
            <button class="spin-btn" id="blurInc">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="save-button-container">
      <button class="download-btn" id="downloadBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        SAVE POST IMAGE
      </button>
    </div>
  </div>
</div>

<canvas id="fullCanvas" width="1080" height="1920" style="display:none;"></canvas>
<div class="toast" id="toast"></div>

<script>
// ... (All previous variables and functions remain the same: bgImages, FONTS, buildFontDropdown, toGrayscaleDataUrl, addThumbnail, generatePreview, drawTextAndOverlay, drawWatermark, etc.)

// Updated Download / Share Logic
document.getElementById('downloadBtn').addEventListener('click', async () => {
  const text = document.getElementById('textInput').value.trim();
  if (!text) {
    showToast('Please enter some text first');
    return;
  }

  const btn = document.getElementById('downloadBtn');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `Generating...`;

  try {
    // Generate the image on the hidden full-size canvas
    const canvas = document.getElementById('fullCanvas');
    const ctx = canvas.getContext('2d');

    if (currentBgIndex >= 0 && bgImages[currentBgIndex]) {
      const img = new Image();
      await new Promise(resolve => {
        img.onload = () => {
          const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
          const dw = img.width * scale, dh = img.height * scale;
          const ox = (canvas.width - dw) / 2, oy = (canvas.height - dh) / 2;

          ctx.filter = blurAmount > 0 ? `blur(${blurAmount * 2.8}px)` : 'none';
          ctx.drawImage(img, ox, oy, dw, dh);
          ctx.filter = 'none';
          drawTextAndOverlay(ctx, canvas);
          resolve();
        };
        img.src = bgImages[currentBgIndex];
      });
    } else {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawTextAndOverlay(ctx, canvas);
    }

    const dataUrl = canvas.toDataURL('image/png');
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const file = new File([blob], "jimotown-post.png", { type: "image/png" });

    // iOS Native Share Sheet
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'JimoTown Post',
          text: 'Created with JimoTown Post Lab 🔥'
        });
        showToast('Shared via iOS sheet ✓');
        return;
      } catch (err) {
        if (err.name !== 'AbortError') console.error(err);
      }
    }

    // Fallback: normal download (Android, desktop, or if share fails)
    const link = document.createElement('a');
    link.download = `jimotown-post-${Date.now()}.png`;
    link.href = dataUrl;
    link.click();
    showToast('Image downloaded');

  } catch (err) {
    console.error(err);
    showToast('Failed to save — try again');
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
});

// Rest of the code (buildFontDropdown, generatePreview, controls, etc.) remains unchanged from the previous mobile version

// Initialize
buildFontDropdown();
generatePreview();
</script>
</body>
</html>
