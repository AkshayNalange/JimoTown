
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JimoTown • Post Lab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&family=Poppins:wght@600;700&family=Manrope:wght@700&family=Clash+Grotesk:wght@600;700&family=Instrument+Sans:wght@600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --surface: #161616;
    --border: #242424;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.98);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .main {
    flex: 1;
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* Preview - Bigger on mobile */
  .preview-section {
    width: 100%;
  }

  .preview-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-align: center;
  }

  .preview-frame {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #000;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    border: 1px solid #222;
    position: relative;
  }

  #previewCanvas {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* Controls Panel */
  .controls-section {
    background: var(--panel);
    border-radius: 24px;
    border: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Background Button */
  .bg-button {
    width: 100%;
    padding: 18px;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 18px;
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .bg-button:active {
    background: rgba(232,255,71,0.1);
    border-color: var(--accent);
  }

  .bg-strip {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 8px 0;
    -webkit-overflow-scrolling: touch;
  }

  .bg-thumb {
    width: 62px;
    height: 62px;
    border-radius: 14px;
    object-fit: cover;
    cursor: pointer;
    border: 3px solid transparent;
    filter: grayscale(75%);
    flex-shrink: 0;
  }

  .bg-thumb.active {
    border-color: var(--accent);
    filter: none;
    transform: scale(1.06);
  }

  textarea {
    width: 100%;
    height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    color: white;
    font-size: 15.5px;
    line-height: 1.65;
    resize: none;
  }

  .font-select {
    width: 100%;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .control-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
  }

  .ctrl-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .ctrl-value {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    color: var(--accent);
    text-align: center;
    font-weight: 600;
  }

  .spin-btn {
    width: 50px;
    height: 50px;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .spin-btn:active {
    background: var(--accent);
    color: black;
    transform: scale(0.92);
  }

  .text-actions {
    display: flex;
    gap: 12px;
    margin-top: 10px;
  }

  .ghost-btn {
    flex: 1;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
  }

  .ghost-btn.red {
    color: #ff6666;
    border-color: #ff6666;
  }

  .save-button-container {
    margin-top: 12px;
  }

  .download-btn {
    width: 100%;
    height: 62px;
    background: linear-gradient(90deg, var(--accent), #c8ff00);
    color: black;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.6px;
    border: none;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 10px 30px rgba(232, 255, 71, 0.35);
  }

  .download-btn:active {
    transform: scale(0.97);
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1f1f1f;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 14px 26px;
    border-radius: 50px;
    font-size: 14.5px;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-12px);
  }
</style>
</head>
<body>

<header>
  <div class="logo">JIMOTOWN</div>
  <div style="font-family:monospace; font-size:11px; color:#666;">POST LAB</div>
</header>

<div class="main">

  <!-- LIVE PREVIEW -->
  <div class="preview-section">
    <div class="preview-header">LIVE PREVIEW — 1080 × 1920</div>
    <div class="preview-frame">
      <canvas id="previewCanvas" width="1080" height="1920"></canvas>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-section">

    <!-- Background -->
    <div>
      <div class="section-label">Background</div>
      <label class="bg-button">
        <input type="file" id="bgFileInput" accept="image/*" multiple style="display:none;">
        🖼️ Choose Background Image(s)
      </label>
      <div class="bg-strip" id="bgStrip"></div>
      <button id="clearImgBtn" style="margin-top:12px;width:100%;padding:12px;background:transparent;border:1px solid #ff5555;color:#ff5555;border-radius:14px;display:none;">Clear All Backgrounds</button>
    </div>

    <!-- Text -->
    <div>
      <div class="section-label">Text Content</div>
      <textarea id="textInput" placeholder="Write your viral caption here..."></textarea>
      <div class="text-actions">
        <button class="ghost-btn red" id="clearTextBtn">✕ Clear Text</button>
      </div>
    </div>

    <!-- Font -->
    <div>
      <div class="section-label">Font Style</div>
      <select id="fontSelect" class="font-select"></select>
    </div>

    <!-- Adjustments -->
    <div>
      <div class="section-label">Adjustments</div>
      <div class="controls-grid">
        <div class="control-card">
          <div class="ctrl-label">FONT SIZE</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="spin-btn" id="fontDec">−</button>
            <span class="ctrl-value" id="sizeValue">82</span>
            <button class="spin-btn" id="fontInc">+</button>
          </div>
        </div>
        <div class="control-card">
          <div class="ctrl-label">BLUR</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="spin-btn" id="blurDec">−</button>
            <span class="ctrl-value" id="blurValue">5</span>
            <button class="spin-btn" id="blurInc">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <div class="save-button-container">
      <button class="download-btn" id="downloadBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        SAVE POST IMAGE
      </button>
    </div>

  </div>
</div>

<canvas id="fullCanvas" width="1080" height="1920" style="display:none;"></canvas>
<div class="toast" id="toast"></div>

<script>
// Variables
let bgImages = [];
let currentBgIndex = -1;
let fontSize = 82;
let blurAmount = 5;

const FONTS = [
  { name: "Clash Grotesk",          family: "'Clash Grotesk', sans-serif",          desc: "Bold & modern" },
  { name: "Instrument Sans",        family: "'Instrument Sans', sans-serif",        desc: "Clean & technical" },
  { name: "Manrope",                family: "'Manrope', sans-serif",                desc: "Friendly & modern" },
  { name: "Poppins Bold",           family: "'Poppins', sans-serif",                desc: "Strong & geometric" },
  { name: "Space Grotesk",          family: "'Space Grotesk', sans-serif",          desc: "Futuristic" },
  { name: "Syne",                   family: "'Syne', sans-serif",                   desc: "Powerful & sharp" },
  { name: "Bebas Neue",             family: "'Bebas Neue', sans-serif",             desc: "Impactful headlines" },
  { name: "Josefin Sans",           family: "'Josefin Sans', sans-serif",           desc: "Elegant modern" },
  { name: "Playfair Display",       family: "'Playfair Display', serif",            desc: "Classic serif" },
  { name: "Pacifico",               family: "'Pacifico', cursive",                  desc: "Handwritten warmth" },
  { name: "Lora",                   family: "'Lora', serif",                        desc: "Readable serif" },
  { name: "Oswald",                 family: "'Oswald', sans-serif",                 desc: "Condensed & bold" },
  { name: "Abril Fatface",          family: "'Abril Fatface', serif",               desc: "Dramatic display" },
  { name: "Caveat",                 family: "'Caveat', cursive",                    desc: "Casual handwritten" },
  { name: "Raleway",                family: "'Raleway', sans-serif",                desc: "Refined sans" },
  { name: "DM Sans",                family: "'DM Sans', sans-serif",                desc: "Neutral & clean" },
  { name: "Helvetica",              family: "Helvetica, Arial, sans-serif",         desc: "Clarity, neutrality & modern precision" },
  { name: "Pinyon Script",          family: "'Pinyon Script', cursive",             desc: "Romance, softness, elegance & warmth" },
  { name: "PF Editorial New",       family: "'Playfair Display', serif",            desc: "Refined storytelling with editorial drama" },
  { name: "Haas Grot",              family: "Helvetica, Arial, sans-serif",         desc: "Timeless Swiss, functional & classy" },
  { name: "Charthe",                family: "'Pacifico', cursive",                  desc: "Festive, playful & joyful energy" }
];

let selectedFontIndex = 0;

// Build Font Dropdown
function buildFontDropdown() {
  const select = document.getElementById('fontSelect');
  select.innerHTML = '';
  FONTS.forEach((font, i) => {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = `${font.name} — ${font.desc}`;
    if (i === 0) option.selected = true;
    select.appendChild(option);
  });

  select.addEventListener('change', () => {
    selectedFontIndex = parseInt(select.value);
    generatePreview();
  });
}

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}

// Grayscale
function toGrayscaleDataUrl(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, c.width, c.height);
  for (let i = 0; i < data.data.length; i += 4) {
    const gray = 0.299*data.data[i] + 0.587*data.data[i+1] + 0.114*data.data[i+2];
    data.data[i] = data.data[i+1] = data.data[i+2] = gray;
  }
  ctx.putImageData(data, 0, 0);
  return c.toDataURL('image/jpeg', 0.92);
}

function addThumbnail(dataUrl, index) {
  const strip = document.getElementById('bgStrip');
  const thumb = document.createElement('img');
  thumb.src = dataUrl;
  thumb.className = 'bg-thumb';
  thumb.dataset.index = index;
  thumb.onclick = () => {
    currentBgIndex = index;
    document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active'));
    thumb.classList.add('active');
    generatePreview();
  };
  strip.appendChild(thumb);
}

// Background Upload
document.getElementById('bgFileInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const grayUrl = toGrayscaleDataUrl(img);
        const idx = bgImages.length;
        bgImages.push(grayUrl);
        addThumbnail(grayUrl, idx);
        if (bgImages.length === 1) {
          currentBgIndex = 0;
          document.querySelector('.bg-thumb').classList.add('active');
        }
        document.getElementById('clearImgBtn').style.display = 'block';
        generatePreview();
        showToast('Background added ✓');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

document.getElementById('clearImgBtn').addEventListener('click', () => {
  bgImages = [];
  currentBgIndex = -1;
  document.getElementById('bgStrip').innerHTML = '';
  document.getElementById('clearImgBtn').style.display = 'none';
  generatePreview();
  showToast('Backgrounds cleared');
});

document.getElementById('clearTextBtn').addEventListener('click', () => {
  document.getElementById('textInput').value = '';
  generatePreview();
  showToast('Text cleared');
});

// Canvas Logic
function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  let lines = [], current = words[0];
  for (let i = 1; i < words.length; i++) {
    if (ctx.measureText(current + ' ' + words[i]).width < maxWidth)
      current += ' ' + words[i];
    else {
      lines.push(current);
      current = words[i];
    }
  }
  lines.push(current);
  return lines;
}

function generatePreview() {
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (currentBgIndex >= 0 && bgImages[currentBgIndex]) {
    const img = new Image();
    img.onload = () => {
      const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      const ox = (canvas.width - dw) / 2, oy = (canvas.height - dh) / 2;

      ctx.filter = blurAmount > 0 ? `blur(${blurAmount * 2.8}px)` : 'none';
      ctx.drawImage(img, ox, oy, dw, dh);
      ctx.filter = 'none';
      drawTextAndOverlay(ctx, canvas);
    };
    img.src = bgImages[currentBgIndex];
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawTextAndOverlay(ctx, canvas);
  }
}

function drawTextAndOverlay(ctx, canvas) {
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const text = document.getElementById('textInput').value.trim();
  if (!text) {
    drawWatermark(ctx, canvas);
    return;
  }

  const fontFamily = FONTS[selectedFontIndex].family;
  let fs = fontSize;
  ctx.fillStyle = '#f5f5f5';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `${fs}px ${fontFamily}`;

  const maxW = canvas.width * 0.82;
  let lines = [];
  text.split('\n').forEach(p => {
    if (!p.trim()) lines.push('');
    else lines = lines.concat(wrapText(ctx, p, maxW));
  });

  while (lines.some(l => l && ctx.measureText(l).width > maxW) && fs > 45) {
    fs -= 4;
    ctx.font = `${fs}px ${fontFamily}`;
  }

  const lineHeight = fs * 1.35;
  const totalHeight = lines.length * lineHeight;
  let y = (canvas.height - totalHeight) / 2 + lineHeight * 0.35;

  lines.forEach(line => {
    if (line) ctx.fillText(line, canvas.width / 2, y);
    y += lineHeight;
  });

  drawWatermark(ctx, canvas);
}

function drawWatermark(ctx, canvas) {
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#ffffff';
  ctx.font = '28px "DM Sans", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('@JimoTown', canvas.width - 70, canvas.height - 50);
  ctx.globalAlpha = 1;
}

// Download
document.getElementById('downloadBtn').addEventListener('click', () => {
  const text = document.getElementById('textInput').value.trim();
  if (!text) {
    showToast('Please enter some text first');
    return;
  }

  const canvas = document.getElementById('fullCanvas');
  const ctx = canvas.getContext('2d');

  if (currentBgIndex >= 0 && bgImages[currentBgIndex]) {
    const img = new Image();
    img.onload = () => {
      const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      const ox = (canvas.width - dw) / 2, oy = (canvas.height - dh) / 2;

      ctx.filter = blurAmount > 0 ? `blur(${blurAmount * 2.8}px)` : 'none';
      ctx.drawImage(img, ox, oy, dw, dh);
      ctx.filter = 'none';
      drawTextAndOverlay(ctx, canvas);
      downloadCanvas(canvas);
    };
    img.src = bgImages[currentBgIndex];
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawTextAndOverlay(ctx, canvas);
    downloadCanvas(canvas);
  }
});

function downloadCanvas(canvas) {
  const link = document.createElement('a');
  link.download = `jimotown-post-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Post saved successfully 🔥');
}

// Live Updates
document.getElementById('textInput').addEventListener('input', generatePreview);

document.getElementById('fontInc').addEventListener('click', () => {
  if (fontSize < 160) { fontSize += 4; document.getElementById('sizeValue').textContent = fontSize; generatePreview(); }
});
document.getElementById('fontDec').addEventListener('click', () => {
  if (fontSize > 40) { fontSize -= 4; document.getElementById('sizeValue').textContent = fontSize; generatePreview(); }
});
document.getElementById('blurInc').addEventListener('click', () => {
  if (blurAmount < 25) { blurAmount += 1; document.getElementById('blurValue').textContent = blurAmount; generatePreview(); }
});
document.getElementById('blurDec').addEventListener('click', () => {
  if (blurAmount > 0) { blurAmount -= 1; document.getElementById('blurValue').textContent = blurAmount; generatePreview(); }
});

// Initialize
buildFontDropdown();
generatePreview();
</script>
</body>
</html>
